{% extends "base.html" %}
{% block title %}Blacklists — Blacklist Monitor{% endblock %}
{% block content %}
<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">
  <div>
    <h1 class="page-title" data-i18n="blacklists.title">Blacklists</h1>
    <p class="page-subtitle" data-i18n="blacklists.subtitle">DNSBLs/RBLs consultadas pelo motor de verificação</p>
  </div>
  <button class="btn btn-primary" onclick="openBLModal()" data-i18n="blacklists.newBlacklist">+ Nova Blacklist</button>
</div>

<div class="card">
  <div style="overflow-x:auto;">
    <table>
      <thead><tr><th data-i18n="blacklists.colName">Nome</th><th data-i18n="blacklists.colZone">Zona</th><th data-i18n="blacklists.colType">Tipo</th><th data-i18n="blacklists.colDefaultSeverity">Severidade padrão</th><th data-i18n="blacklists.colQps">QPS</th><th data-i18n="blacklists.colKey">Chave</th><th data-i18n="common.status">Status</th><th colspan="2"></th></tr></thead>
      <tbody id="bl-tbody"></tbody>
    </table>
  </div>
</div>

<div id="bl-modal" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <p class="section-title" id="bl-modal-title" data-i18n="blacklists.modalTitleNew">Nova Blacklist</p>
    <div class="form-field" style="margin-bottom:10px;"><label data-i18n="blacklists.fieldName">Nome</label><input id="bl-name"></div>
    <div class="form-field" style="margin-bottom:10px;"><label data-i18n="blacklists.fieldZone">Zona DNS (use {key} se exigir chave DQS)</label><input id="bl-zone" data-i18n-placeholder="blacklists.zonePlaceholder" placeholder="ex.: {key}.zen.dq.spamhaus.net"></div>
    <div class="form-grid" style="margin-bottom:10px;">
      <div class="form-field"><label data-i18n="blacklists.fieldType">Tipo</label>
        <select id="bl-type"><option value="ipv4" data-i18n="blacklists.typeIpv4">IPv4</option><option value="ipv6" data-i18n="blacklists.typeIpv6">IPv6</option><option value="domain" data-i18n="blacklists.typeDomain">Domínio</option></select>
      </div>
      <div class="form-field"><label data-i18n="blacklists.fieldDefaultSeverity">Severidade padrão</label>
        <select id="bl-severity"><option value="critical" data-i18n="severity.critical">Crítica</option><option value="high" data-i18n="severity.high">Alta</option><option value="medium" selected data-i18n="severity.medium">Média</option><option value="low" data-i18n="severity.low">Baixa</option></select>
      </div>
    </div>
    <div class="form-grid" style="margin-bottom:10px;">
      <div class="form-field"><label data-i18n="blacklists.fieldRateLimit">Rate limit (QPS)</label><input id="bl-qps" type="number" value="5"></div>
      <div class="form-field"><label data-i18n="blacklists.fieldRequiresKey">Requer chave?</label>
        <select id="bl-requires-key"><option value="false" data-i18n="common.no">Não</option><option value="true" data-i18n="blacklists.requiresKeyYes">Sim (DQS etc.)</option></select>
      </div>
    </div>
    <div class="form-field" style="margin-bottom:10px;"><label data-i18n="blacklists.fieldKey">Chave (criptografada em repouso)</label><input id="bl-key" type="password" data-i18n-placeholder="blacklists.keyPlaceholderEdit" placeholder="deixe em branco para manter a chave atual"></div>
    <div class="form-grid" style="margin-bottom:16px;">
      <div class="form-field"><label data-i18n="blacklists.fieldDelistUrl">URL de delist</label><input id="bl-delist-url"></div>
      <div class="form-field"><label data-i18n="blacklists.fieldLookupUrl">URL de lookup</label><input id="bl-lookup-url"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeBLModal()" data-i18n="common.cancel">Cancelar</button>
      <button class="btn btn-primary" onclick="submitBL()" data-i18n="common.save">Salvar</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/blacklists.js"></script>{% endblock %}
